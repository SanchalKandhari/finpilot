{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinPilot Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'finpilot/styles.css' %}" />
    <style>
      .session-bar {
        width: min(1180px, calc(100vw - 32px));
        margin: 18px auto 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 14px 18px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(31, 41, 55, 0.08);
        box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
      }

      .session-copy {
        color: #667085;
      }

      .session-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .session-pill,
      .logout-button {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(31, 41, 55, 0.1);
        background: rgba(255, 255, 255, 0.88);
        color: #1f2937;
        text-decoration: none;
        font: inherit;
      }

      .logout-button {
        cursor: pointer;
      }

      @media (max-width: 720px) {
        .session-bar {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="session-bar">
      <div class="session-copy">
        Logged in as <strong>{{ request.user.username }}</strong>
      </div>
      <div class="session-actions">
        <a class="session-pill" href="{% url 'login' %}">Switch account</a>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="logout-button">Logout</button>
        </form>
      </div>
    </div>

    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="{% static 'finpilot/app.js' %}"></script>
  </body>
  </html>
